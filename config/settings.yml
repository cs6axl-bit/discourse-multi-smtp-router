# config/settings.yml

plugins:
  multi_smtp_router_enabled:
    default: false
    client: false
    type: bool

  multi_smtp_router_debug_log_enabled:
    default: false
    client: false
    type: bool

  # Routing mode switches
  multi_smtp_router_random_enabled:
    default: true
    client: false
    type: bool

  multi_smtp_router_weighted_enabled:
    default: false
    client: false
    type: bool

  multi_smtp_router_domain_override_enabled:
    default: false
    client: false
    type: bool

  # Metrics-based routing (uses digest_provider_domain_metrics)
  multi_smtp_router_domain_metrics_enabled:
    default: false
    client: false
    type: bool

  # 45 minutes = 2700 seconds
  multi_smtp_router_domain_metrics_cache_ttl_seconds:
    default: 2700
    client: false
    type: integer
    min: 60
    max: 86400

  multi_smtp_router_domain_metrics_pre_random_percent:
    default: 10
    client: false
    type: integer
    min: 0
    max: 100

  multi_smtp_router_domain_metrics_single_row_random_percent:
    default: 0
    client: false
    type: integer
    min: 0
    max: 100

  # Domain override pairs (list)
  # Example lines:
  #   gmail.com=mailgun
  #   yahoo.com:sendpulse
  #   outlook.com>sparkpost1
  multi_smtp_router_domain_provider_pairs:
    default: ""
    client: false
    type: list

  # Force Message-ID generation before swapping (use if Message-ID swap is unreliable for some email types)
  multi_smtp_router_domain_swap_message_id_force_generate:
    default: false
    client: false
    type: bool

  # --------------------
  # Email verification-based pool filtering
  # --------------------
  multi_smtp_router_verification_enabled:
    default: false
    client: false
    type: bool

  multi_smtp_router_verification_table:
    default: "email_verifications"
    client: false
    type: text

  multi_smtp_router_verification_email_column:
    default: "email"
    client: false
    type: text

  multi_smtp_router_verification_status_column:
    default: "status"
    client: false
    type: text

  # Status assigned when email is not found in the table
  multi_smtp_router_verification_default_status:
    default: "unknown"
    client: false
    type: text

  multi_smtp_router_verification_cache_enabled:
    default: true
    client: false
    type: bool

  multi_smtp_router_verification_cache_ttl_days:
    default: 30
    client: false
    type: integer
    min: 1
    max: 365

  # Optional async external logging
  multi_smtp_router_log_to_endpoint_enabled:
    default: false
    client: false
    type: bool

  multi_smtp_router_log_endpoint_url:
    default: ""
    client: false
    type: text

  multi_smtp_router_log_http_open_timeout:
    default: 2
    client: false
    type: integer
    min: 1
    max: 30

  multi_smtp_router_log_http_read_timeout:
    default: 3
    client: false
    type: integer
    min: 1
    max: 60

  # --------------------
  # Provider slots (6)
  # --------------------
  multi_smtp_router_p1_enabled:
    default: false
    client: false
    type: bool
  multi_smtp_router_p1_id:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_weight_percent:
    default: 0
    client: false
    type: integer
    min: 0
    max: 100
  multi_smtp_router_p1_from_address:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_reply_to_address:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_smtp_address:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_smtp_port:
    default: 587
    client: false
    type: integer
    min: 1
    max: 65535
  multi_smtp_router_p1_smtp_username:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_smtp_password:
    default: ""
    client: false
    type: password
  multi_smtp_router_p1_smtp_authentication_mode:
    default: plain
    client: false
    type: enum
    choices:
      - plain
      - login
      - cram_md5
  multi_smtp_router_p1_smtp_enable_starttls_auto:
    default: true
    client: false
    type: bool
  multi_smtp_router_p1_smtp_ssl:
    default: false
    client: false
    type: bool
  multi_smtp_router_p1_smtp_tls:
    default: false
    client: false
    type: bool
  multi_smtp_router_p1_smtp_domain:
    default: ""
    client: false
    type: text
  # Verification pool filter for provider 1 (comma-separated statuses; empty = accept any)
  multi_smtp_router_p1_allowed_verification_statuses:
    default: ""
    client: false
    type: text
  # Domain swap for provider 1
  multi_smtp_router_p1_domain_swap_enabled:
    default: false
    client: false
    type: bool
  multi_smtp_router_p1_domain_swap_targets:
    default: ""
    client: false
    type: text
  multi_smtp_router_p1_domain_swap_html_links:
    default: true
    client: false
    type: bool
  multi_smtp_router_p1_domain_swap_text_links:
    default: true
